# whicc release workflow
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.1.0`, `v1.2.3`).
# Builds whicc.app, packages it into a .dmg via bin/build_dmg.sh, and
# uploads to GitHub Releases with bilingual notes (zh first, en in
# <details>).
#
# Usage:
#   git tag v0.1.1
#   git push origin v0.1.1
#   # wait ~5 min for the workflow to finish
#   # GitHub Release v0.1.1 is created automatically with whicc-v0.1.1.dmg attached
#
# To avoid signing complexity (Developer ID + Apple notarization), this
# builds ad-hoc signed only. Users will need to right-click → Open the
# first time on macOS Gatekeeper. For wider distribution, add
# `codesign --deep --options=runtime --sign "Developer ID Application: ..."`
# and `xcrun notarytool submit ...` steps.
#
# This workflow REUSES the ci.yml build steps by calling the same
# commands inline. We could extract to a composite action, but at the
# cost of clarity for two workflows — keeping them separate is fine.

name: release

on:
  push:
    tags:
      - 'v*'   # v0.1.0, v1.2.3, etc.

# Don't cancel mid-release; user is waiting for the artifact.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build + upload .app to GitHub Release
    runs-on: macos-15

    timeout-minutes: 45

    permissions:
      contents: write   # needed for softprops/action-gh-release to create the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Install Xcode 26 (project uses macOS 26 SwiftUI APIs like
      # GlassEffectContainer that don't exist in Xcode 16's macOS 15.5 SDK).
      # macos-15 image ships with Xcode 16.4 by default; without this
      # step, xcodebuild picks up Xcode 16 → compile errors. ----
      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Select Xcode 26 as default
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show tag + Xcode version
        run: |
          echo "Building ${{ github.ref_name }}"
          git describe --tags --always
          xcodebuild -version

      # ---- Diagnostic snapshot (capture regardless of build outcome) ----
      # Captures GitHub runner's environment so failure analysis
      # doesn't depend on accessing CI logs (which require admin auth).
      # Note: This step uploads to env-snapshot artifact on EVERY run
      # (success and failure). That's 1KB / run of storage — 30KB / month
      # if you ship one release a month, well within free quota.
      - name: Capture + upload env snapshot
        if: always()
        run: |
          {
            echo "=== uname ==="
            uname -a
            echo "=== xcode-select ==="
            xcode-select -p
            echo "=== xcodebuild -version ==="
            xcodebuild -version
            echo "=== sh ==="
            ls -la /bin/sh
            echo "=== which python3.13 ==="
            which python3.13 || echo "(not on PATH)"
            echo "=== disk ==="
            df -h / /tmp
            echo "=== memory ==="
            vm_stat | head -5
            echo "=== ulimit ==="
            ulimit -a
            echo "=== /tmp contents ==="
            ls -la /tmp/ | head -20
            echo "=== venv-standalone structure (post-symlink) ==="
            ls -la venv-standalone/ 2>&1 | head -5
            ls venv-standalone/bin/ 2>&1 | head
            echo "=== xcodebuild.log size BEFORE build ==="
            ls -la /tmp/xcodebuild.log 2>&1 || echo "(no log yet)"
          } > /tmp/env_snapshot.txt 2>&1
          echo "---env_snapshot.txt first 30 lines---"
          head -30 /tmp/env_snapshot.txt
      - name: Upload env snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: env-snapshot
          path: /tmp/env_snapshot.txt
          retention-days: 3
          if-no-files-found: ignore

      # ---- Python deps (used by xcodegen preBuildScripts that embed backend) ----
      # Same setup as ci.yml — fresh VM each run, recreate venv-standalone.
      #
      # IMPORTANT: 必须用绝对路径调系统 Python.framework 的 python3.13,
      # 否则 venv wrapper 会硬编码 homebrew python@3.13.14 路径,
      # 用户机没装 homebrew 时 dyld fail → ASR 失效。详细原因见 ci.yml
      # 注释。SOP.md §Troubleshooting 同步记录了这条踩坑。
      - name: Setup Python 3.13 venv
        run: |
          SYSTEM_PYTHON="/Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13"
          "$SYSTEM_PYTHON" -m venv /tmp/whicc-venv
          /tmp/whicc-venv/bin/pip install --upgrade pip wheel
          /tmp/whicc-venv/bin/pip install -r requirements.txt

      - name: Symlink venv-standalone for build script
        run: ln -sfn /tmp/whicc-venv venv-standalone

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .

      # ---- Main build (Release) ----
      # This is the same command as DEVELOPMENT.md "快速打包". Build artifact
      # ends up at build/Build/Products/Release/whicc.app.
      #
      # Tee output to a log file so we can capture failure diagnostics
      # in a workflow artifact (default xcodebuild output is buffered and
      # hidden if the step exits non-zero). The last 200 lines of xcodebuild
      # output are uploaded even on failure — without this, debug info
      # for a failed release is lost (CI logs are admin-restricted).
      - name: Build whicc (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project whicc.xcodeproj \
            -scheme whicc \
            -configuration Release \
            -derivedDataPath build \
            clean build 2>&1 | tee /tmp/xcodebuild.log
          echo "=== last 200 lines of xcodebuild output ==="
          tail -200 /tmp/xcodebuild.log || true
          echo "=== end ==="
      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 3
          if-no-files-found: ignore

      # ---- Sanity check: app bundle exists ----
      - name: Verify .app bundle
        run: |
          ls -la build/Build/Products/Release/whicc.app
          # Confirm executable is there
          test -x build/Build/Products/Release/whicc.app/Contents/MacOS/whicc \
            && echo "✓ executable present" \
            || (echo "✗ executable missing"; exit 1)
          # Confirm .lproj is bundled (CI lint passed earlier, but be paranoid)
          ls build/Build/Products/Release/whicc.app/Contents/Resources/en.lproj/Localizable.strings

      # ---- Build .dmg for distribution ----
      # bin/build_dmg.sh wraps the hdiutil dance: create UDRW → mount →
      # ditto .app in → detach → convert to UDZO. Plain dmg layout
      # (no custom Finder window) keeps the script simple; users get
      # the standard mount → drag-to-Applications flow.
      # -size 700m: whicc.app is ~566 MB (Python venv with mlx/numpy/scipy).
      # Tag name is the version, e.g. v0.1.1 → "0.1.1".
      - name: Build .dmg
        run: |
          chmod +x bin/build_dmg.sh
          VERSION="${GITHUB_REF_NAME#v}"
          bin/build_dmg.sh "$VERSION" \
            "build/Build/Products/Release/whicc.app" \
            "build/Build/Products/Release/whicc-${GITHUB_REF_NAME}.dmg"
          ls -la "build/Build/Products/Release/whicc-${GITHUB_REF_NAME}.dmg"

      # ---- Compute size + SHA256 of the .dmg (for release notes) ----
      # The .dmg is what users download; the .app directory is internal.
      - name: Compute .dmg size + SHA256
        id: metadata
        run: |
          cd build/Build/Products/Release
          DMG="whicc-${GITHUB_REF_NAME}.dmg"
          SIZE=$(du -sh "$DMG" | cut -f1)
          BYTES=$(du -sb "$DMG" | cut -f1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)
          echo "size=$SIZE"
          echo "bytes=$BYTES"
          echo "sha=$SHA"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # ---- Generate SHA256SUMS for the release ----
      - name: Generate SHA256SUMS file
        run: |
          cd build/Build/Products/Release
          shasum -a 256 whicc-${GITHUB_REF_NAME}.dmg > SHA256SUMS
          cat SHA256SUMS

      # ---- Create GitHub Release + upload assets ----
      # softprops/action-gh-release handles both release creation and asset
      # upload in one step. It uses GitHub's auto-generated release notes
      # (which derive from merged PRs since the last tag) and lets us add
      # extra notes via `body:`.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # Use the tag name as the release title; users will see "v0.1.0"
          name: ${{ github.ref_name }}
          generate_release_notes: true   # auto-generate from merged PRs
          body: |
            **大小**: ${{ steps.metadata.outputs.size }}
            **SHA256**: `${{ steps.metadata.outputs.sha }}`

            下载 `whicc-${{ github.ref_name }}.dmg`，双击挂载，把
            `whicc.app` 拖到 `/Applications/`。首次启动：右键 → 打开
            （Gatekeeper 对 ad-hoc 签名应用的要求）。

            <details>
            <summary>English</summary>

            **Size**: ${{ steps.metadata.outputs.size }}
            **SHA256**: `${{ steps.metadata.outputs.sha }}`

            Download `whicc-${{ github.ref_name }}.dmg`, double-click to
            mount, drag `whicc.app` to `/Applications/`. First launch:
            right-click → Open (Gatekeeper requires this for ad-hoc
            signed builds).

            </details>
          files: |
            build/Build/Products/Release/whicc-${{ github.ref_name }}.dmg
            build/Build/Products/Release/SHA256SUMS
          fail_on_unmatched_files: true