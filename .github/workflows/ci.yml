# whicc CI
#
# On every push to main and every PR, run on a macOS runner:
#   1. xcodebuild clean build (verify Swift + macOS 26 deployment target)
#   2. plutil -lint on every .lproj/Localizable.strings (catch missing semicolons / broken quotes)
#   3. Python key check: every key in any *.lproj must match a Chinese literal in source
#
# venv-standalone is .gitignored, so CI just installs deps fresh each run
# from python-build-standalone (self-contained interpreter, see
# DEVELOPMENT.md "一次性 setup") + pip install -r requirements.txt.
#
# This is the minimum bar for open-source PR review — without it, contributors
# can't tell whether their i18n PR actually broke en locale before maintainer
# gets paged.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS build + i18n lint
    runs-on: macos-15   # Default image ships with Xcode 16.x; we explicitly
                        # install Xcode 26 below (project requires macOS 26 SDK).

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Install Xcode 26: we compile against the macOS 26 SDK so the
      # `if #available(macOS 26.0, *)` Liquid Glass branch
      # (GlassEffectContainer) can be compiled in, while
      # MACOSX_DEPLOYMENT_TARGET=15.0 keeps the app runnable on
      # macOS 15. Xcode 16's macOS 15.5 SDK lacks the symbol → build
      # fails without this step. ----
      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Select Xcode 26 as default
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ---- Python deps (used by xcodegen preBuildScripts that embed backend) ----
      # The Xcode preBuildScripts in project.yml runs `cp -R venv-standalone/`
      # to copy Python into the .app bundle. CI re-creates venv-standalone
      # from requirements.txt so we don't ship a 1.3GB binary in git.
      #
      # IMPORTANT: 必须用 python-build-standalone(自包含解释器,相对
      # install name),不能用 `python3 -m venv`。任何基于本机 Python 的
      # venv(homebrew 的 /opt/homebrew/Cellar/... 或 python.org 的
      # /Library/Frameworks/Python.framework/...)都会让内嵌 python3
      # dyld 链接一条用户机上不存在的绝对路径 → 后端全灭无字幕。
      # 见 DEVELOPMENT.md "一次性 setup" 与其中的 ⚠️ 警告。
      # 另外:在 macos-15 runner 上 pip 会选 macosx_15_0_arm64 的 mlx
      # wheel,保证产物能跑在 macOS 15(有 build 后校验步骤兜底)。
      - name: Setup standalone Python 3.13 (self-contained)
        run: |
          curl -sL -o /tmp/cpython-standalone.tar.gz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20260610/cpython-3.13.14+20260610-aarch64-apple-darwin-install_only_stripped.tar.gz"
          mkdir -p /tmp/python-standalone
          tar -xzf /tmp/cpython-standalone.tar.gz -C /tmp/python-standalone
          mkdir -p venv-standalone
          cp -R /tmp/python-standalone/python/* venv-standalone/
          ./venv-standalone/bin/python3.13 -m ensurepip
          ./venv-standalone/bin/pip install --no-cache-dir -r requirements.txt

      # ---- xcodegen: regenerate whicc.xcodeproj from project.yml ----
      # .xcodeproj is .gitignored (each dev regenerates locally), so CI runs
      # xcodegen before xcodebuild. Pin a specific version for reproducibility.
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .

      # ---- Main build (Release, mirrors DEVELOPMENT.md "快速打包") ----
      - name: Build whicc (Release)
        run: |
          xcodebuild \
            -project whicc.xcodeproj \
            -scheme whicc \
            -configuration Release \
            -derivedDataPath build \
            clean build

      # ---- Self-containment + macOS 15 compat guard ----
      # Regression guard for two shipped-broken failure modes:
      # 1. embedded python3 dyld-linking a machine path (homebrew /
      #    python.org framework) → backend dead on user machines;
      # 2. a native wheel built for macOS 26 sneaking in → app dies
      #    on macOS 15 despite MACOSX_DEPLOYMENT_TARGET=15.0.
      - name: Verify embedded Python is self-contained + macOS 15 compatible
        run: |
          set -euo pipefail
          APP=build/Build/Products/Release/whicc.app
          PY="$APP/Contents/Resources/venv/bin/python3"
          test -f "$PY" || { echo "✗ embedded python3 missing"; exit 1; }
          if otool -L "$PY" | grep -E "/Library/Frameworks/Python|/opt/homebrew"; then
            echo "✗ embedded python3 links a machine-specific framework (not self-contained)"
            exit 1
          fi
          echo "✓ embedded python3 is self-contained"
          BAD=0
          for lib in $(find "$APP/Contents/Resources/venv/lib" \
                        \( -name "*.so" -o -name "*.dylib" \) -path "*mlx*"); do
            MINOS=$(otool -l "$lib" 2>/dev/null \
                    | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; exit}')
            case "$MINOS" in
              16.*|2[0-9].*) echo "✗ $lib minos=$MINOS (needs > macOS 15)"; BAD=1 ;;
            esac
          done
          if [ "$BAD" != 0 ]; then exit 1; fi
          echo "✓ mlx native libraries load on macOS 15"

      # ---- i18n lint: every .lproj/Localizable.strings must parse ----
      # Catches: missing semicolons, broken quotes, encoding issues. The
      # plutil binary is built into macOS — no extra install needed.
      - name: Validate Localizable.strings syntax
        run: |
          set -euo pipefail
          for f in macui/Sources/macui/Resources/*.lproj/Localizable.strings; do
            echo "lint: $f"
            plutil -lint "$f"
          done

      # ---- i18n content check: every key must match a Chinese literal in
      # Swift source. Catches typos in keys ("复制译文" vs "复制译问") and
      # orphan keys (translation key that no longer has a source site).
      - name: Verify keys match Swift source literals
        run: |
          python3 - <<'PYEOF'
          import re, pathlib, sys

          strings_files = list(pathlib.Path("macui/Sources/macui/Resources").glob("*.lproj/Localizable.strings"))
          src_files = list(pathlib.Path("macui/Sources/macui").rglob("*.swift"))

          def parse_keys(path):
              keys = []
              for line in path.read_text().splitlines():
                  line = line.strip()
                  if not line or line.startswith("/*") or line.startswith("//") or line.startswith("*"):
                      continue
                  m = re.match(r'"((?:[^"\\]|\\.)*)"\s*=\s*"', line)
                  if m:
                      keys.append(m.group(1))
              return keys

          format_key_re = re.compile(
              r'%(?:\d+\$)?[-+#0 ]*(?:\d+|\*)?(?:\.(?:\d+|\*))?(?:hh|h|ll|l|L|z|j|t)?[@diuoxXfFeEgGaAcCsSp]'
          )

          errors = []
          for sf in strings_files:
              keys = parse_keys(sf)
              # Built-in keys that are NOT Chinese source literals
              # (e.g. Pane.localizedTitle returns English literals like
              # "Appearance" — those don't appear as Text("Appearance") in
              # source). Skip them.
              non_source = {
                  "Appearance", "Speech Recognition Model", "Translation Model", "Hermes",
                  "settings_window_title", "menu_preferences", "menu_quit", "menu_file",
                  "menu_close", "menu_edit", "menu_edit_cut", "menu_edit_copy",
                  "menu_edit_paste", "menu_edit_select_all",
              }
              for k in keys:
                  if k in non_source:
                      continue
                  if format_key_re.search(k):
                      continue
                  if not any(k in sf.read_text() for sf in src_files):
                      errors.append(f"{sf.name}: orphan key {k!r} (not in source)")

          if errors:
              print("Orphan keys detected:", file=sys.stderr)
              for e in errors:
                  print("  " + e, file=sys.stderr)
              sys.exit(1)

          total = sum(len(parse_keys(sf)) for sf in strings_files)
          print(f"All {len(strings_files)} lproj files OK; {total} total keys verified.")
          PYEOF

      # ---- Optional: upload built .app as artifact for manual download ----
      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: whicc-${{ github.sha }}
          path: build/Build/Products/Release/whicc.app
          retention-days: 7
          if-no-files-found: error