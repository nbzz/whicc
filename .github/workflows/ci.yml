# whicc CI
#
# On every push to main and every PR, run on a macOS runner:
#   1. xcodebuild clean build (verify Swift + macOS 26 deployment target)
#   2. plutil -lint on every .lproj/Localizable.strings (catch missing semicolons / broken quotes)
#   3. Python key check: every key in any *.lproj must match a Chinese literal in source
#
# venv-standalone is .gitignored, so CI just installs deps fresh each run:
#   python3.13 -m venv /tmp/whicc-venv
#   /tmp/whicc-venv/bin/pip install -r requirements.txt
#
# This is the minimum bar for open-source PR review — without it, contributors
# can't tell whether their i18n PR actually broke en locale before maintainer
# gets paged.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS build + i18n lint
    runs-on: macos-15   # Default image ships with Xcode 16.x; we explicitly
                        # install Xcode 26 below (project requires macOS 26 SDK).

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Install Xcode 26 (project uses macOS 26 SwiftUI APIs like
      # GlassEffectContainer that don't exist in Xcode 16). Without
      # this step, builds fail with "cannot find 'GlassEffectContainer'
      # in scope" against the default Xcode 16 SDK that ships with
      # macos-15 image. ----
      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Select Xcode 26 as default
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ---- Python deps (used by xcodegen preBuildScripts that embed backend) ----
      # The Xcode preBuildScripts in project.yml runs `cp -R venv-standalone/`
      # to copy Python into the .app bundle. CI re-creates venv-standalone
      # from requirements.txt so we don't ship a 1.3GB binary in git.
      #
      # IMPORTANT: 必须用绝对路径调系统 Python.framework 的 python3.13。
      # `python3.13 -m venv` 依赖 $PATH 解析,macos-15 runner 上一步
      # `brew install xcodegen` 会把 /opt/homebrew/bin 推到 PATH 顶部,
      # 结果 `python3.13` 解析到 homebrew python@3.13.14 → venv wrapper
      # 硬编码 /opt/homebrew/Cellar/python@3.13/3.13.14/...Python。
      # 装到用户机后,用户没装 homebrew 3.13.14 → dyld fail → ASR 失效。
      # 用 framework 路径绑死 system Python (3.13.5),所有机器都装。
      - name: Setup Python 3.13 venv
        run: |
          SYSTEM_PYTHON="/Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13"
          "$SYSTEM_PYTHON" -m venv /tmp/whicc-venv
          /tmp/whicc-venv/bin/pip install --upgrade pip wheel
          /tmp/whicc-venv/bin/pip install -r requirements.txt

      - name: Symlink venv-standalone for build script
        run: ln -sfn /tmp/whicc-venv venv-standalone

      # ---- xcodegen: regenerate whicc.xcodeproj from project.yml ----
      # .xcodeproj is .gitignored (each dev regenerates locally), so CI runs
      # xcodegen before xcodebuild. Pin a specific version for reproducibility.
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .

      # ---- Main build (Release, mirrors DEVELOPMENT.md "快速打包") ----
      - name: Build whicc (Release)
        run: |
          xcodebuild \
            -project whicc.xcodeproj \
            -scheme whicc \
            -configuration Release \
            -derivedDataPath build \
            clean build

      # ---- i18n lint: every .lproj/Localizable.strings must parse ----
      # Catches: missing semicolons, broken quotes, encoding issues. The
      # plutil binary is built into macOS — no extra install needed.
      - name: Validate Localizable.strings syntax
        run: |
          set -euo pipefail
          for f in macui/Sources/macui/Resources/*.lproj/Localizable.strings; do
            echo "lint: $f"
            plutil -lint "$f"
          done

      # ---- i18n content check: every key must match a Chinese literal in
      # Swift source. Catches typos in keys ("复制译文" vs "复制译问") and
      # orphan keys (translation key that no longer has a source site).
      - name: Verify keys match Swift source literals
        run: |
          python3 - <<'PYEOF'
          import re, pathlib, sys

          strings_files = list(pathlib.Path("macui/Sources/macui/Resources").glob("*.lproj/Localizable.strings"))
          src_files = list(pathlib.Path("macui/Sources/macui").rglob("*.swift"))

          def parse_keys(path):
              keys = []
              for line in path.read_text().splitlines():
                  line = line.strip()
                  if not line or line.startswith("/*") or line.startswith("//") or line.startswith("*"):
                      continue
                  m = re.match(r'"((?:[^"\\]|\\.)*)"\s*=\s*"', line)
                  if m:
                      keys.append(m.group(1))
              return keys

          errors = []
          for sf in strings_files:
              keys = parse_keys(sf)
              # Built-in keys that are NOT Chinese source literals
              # (e.g. Pane.localizedTitle returns English literals like
              # "Appearance" — those don't appear as Text("Appearance") in
              # source). Skip them.
              non_source = {
                  "Appearance", "Speech Recognition Model", "Translation Model", "Hermes",
                  "settings_window_title", "menu_preferences", "menu_quit", "menu_file",
                  "menu_close", "menu_edit", "menu_edit_cut", "menu_edit_copy",
                  "menu_edit_paste", "menu_edit_select_all",
              }
              for k in keys:
                  if k in non_source:
                      continue
                  if not any(k in sf.read_text() for sf in src_files):
                      errors.append(f"{sf.name}: orphan key {k!r} (not in source)")

          if errors:
              print("Orphan keys detected:", file=sys.stderr)
              for e in errors:
                  print("  " + e, file=sys.stderr)
              sys.exit(1)

          total = sum(len(parse_keys(sf)) for sf in strings_files)
          print(f"All {len(strings_files)} lproj files OK; {total} total keys verified.")
          PYEOF

      # ---- Optional: upload built .app as artifact for manual download ----
      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: whicc-${{ github.sha }}
          path: build/Build/Products/Release/whicc.app
          retention-days: 7
          if-no-files-found: error